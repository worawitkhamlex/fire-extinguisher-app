<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0F1419">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="description" content="ระบบตรวจสภาพถังดับเพลิงรายเดือน สำหรับแผนก Safety">

  <title>ตรวจถังดับเพลิง</title>

  <link rel="manifest" href="./manifest.json">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧯</text></svg>">
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧯</text></svg>">

  <!-- CSS -->
  <link rel="stylesheet" href="./css/variables.css">
  <link rel="stylesheet" href="./css/base.css">
  <link rel="stylesheet" href="./css/components.css">
  <link rel="stylesheet" href="./css/screens.css">
</head>
<body>

  <!-- App Container -->
  <div id="app">
    <!-- Screens render here -->
    <div class="screen" style="text-align:center; padding-top:40%">
      <div style="font-size:2.5rem">🧯</div>
      <p style="color:var(--color-text-3); margin-top:8px">กำลังโหลด...</p>
    </div>
  </div>

  <!-- Bottom Navigation -->
  <nav class="bottom-nav" id="bottom-nav">
    <button class="bottom-nav__item active" data-route="home">
      <span class="nav-icon">🏠</span>
      <span>หน้าแรก</span>
    </button>
    <button class="bottom-nav__item" data-route="search">
      <span class="nav-icon">🔍</span>
      <span>ค้นหา</span>
    </button>
    <button class="bottom-nav__item" data-route="dashboard">
      <span class="nav-icon">📊</span>
      <span>แดชบอร์ด</span>
    </button>
    <button class="bottom-nav__item" data-route="history">
      <span class="nav-icon">📋</span>
      <span>ประวัติ</span>
    </button>
    <button class="bottom-nav__item" data-route="settings">
      <span class="nav-icon">⚙️</span>
      <span>ตั้งค่า</span>
    </button>
  </nav>

  <!-- App Script (ES Module) -->
  <script type="module" src="./js/app.js"></script>

</body>
</html>
